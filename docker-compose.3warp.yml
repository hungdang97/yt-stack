  # Universal Downloader service (fallback for all other sites)
  uni-downloader:
    platform: linux/amd64
    build:
      context: ./uni-downloader
      dockerfile: Dockerfile
    image: uni-downloader:latest
    container_name: uni-downloader
    restart: always
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
      - STORAGE_DIR=./storage
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      - SIGNED_URL_EXPIRATION_MIN=${SIGNED_URL_EXPIRATION_MIN:-30}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - DOWNLOAD_SUBDOMAIN=${DOWNLOAD_SUBDOMAIN}
      - PATH_PREFIX=/uni
      - UNI_EXTRACTOR_URL=http://uni-extractor:8004
      - HUB_TOKEN=${HUB_TOKEN}
