    networks:
      - backend

  # Nginx: disabled — using host nginx as reverse proxy
  # See /etc/nginx/sites-enabled/ for vhost config

networks:
  backend:
    driver: bridge

volumes:
  warp_data_1:
  warp_data_2:
  warp_data_3:
  yt_storage:
  tik_volume:
  tik_storage:
  insta_storage:
  fb_storage:
  tw_storage:
  uni_storage:
