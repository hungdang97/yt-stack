services:
  # ============================================================
  # WARP Pool - 30 instances with separate identities/IPs
  # Each has its own volume → unique Cloudflare registration
  # ============================================================
  warp-1:
    image: caomingjun/warp:latest
    container_name: warp-1
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_1:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  warp-2:
    image: caomingjun/warp:latest
    container_name: warp-2
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_2:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  warp-3:
    image: caomingjun/warp:latest
    container_name: warp-3
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_3:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  gost:
    image: ginuerzh/gost:latest
    container_name: gost
    restart: always
    depends_on:
      warp-1:
        condition: service_healthy
      warp-2:
        condition: service_healthy
      warp-3:
        condition: service_healthy
    ports:
      - "1111:1111" # WARP proxy (public, load balanced)
      - "2223:2223" # Direct proxy (avoid SSH on 2222)
    environment:
      - WARP_USER=${WARP_USER}
      - WARP_PASS=${WARP_PASS}
      - DIRECT_USER=${DIRECT_USER}
      - DIRECT_PASS=${DIRECT_PASS}
    command: >
      -L=http://${WARP_USER}:${WARP_PASS}@:1111?probeResist=code:400 -F=socks5://warp-1:40000?ip=warp-1:40000,warp-2:40000,warp-3:40000&strategy=round&max_fails=1&fail_timeout=180s -L=http://${DIRECT_USER}:${DIRECT_PASS}@:2223?probeResist=code:400 -F=socks5://warp-1:40000?ip=warp-1:40000,warp-2:40000,warp-3:40000&strategy=round&max_fails=1&fail_timeout=180s -L=http://${DIRECT_USER}:${DIRECT_PASS}@:2223?probeResist=code:400 -F=socks5://warp-1:40000?ip=warp-1:40000,warp-2:40000,warp-3:40000&strategy=round&max_fails=1&fail_timeout=180s -L=http://${DIRECT_USER}:${DIRECT_PASS}@:2223?probeResist=code:400
    networks:
      - backend

  # YouTube Downloader Go service
  yt-downloader:
    platform: linux/amd64
    build:
      context: ./yt-downloader
      dockerfile: Dockerfile
    image: yt-downloader:latest
    container_name: yt-downloader
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env # Load all ~30 config variables
    volumes:
      - yt_storage:/app/storage
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          # Limit to 8 CPU cores
          cpus: '8'
    networks:
      - backend

  # YouTube Extractor Python service (Fallback layer)
  yt-extractor:
    platform: linux/amd64
    build:
      context: ./yt-extractor
      dockerfile: Dockerfile
    image: yt-extractor:latest
    container_name: yt-extractor
    restart: always
    ports:
      - "8300:8300" # Expose for external access
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=${MONGO_URI}
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8300/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend

  # TikTok Extractor service
  tik-extractor:
    build:
      context: ./tik-extractor
      dockerfile: Dockerfile.api
    container_name: tik-extractor
    restart: unless-stopped
    ports:
      - "5555:5555" # Expose TikTok API
    volumes:
      - tik_volume:/app/Volume
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # TikTok Downloader service
  tik-downloader:
    platform: linux/amd64
    build:
      context: ./tik-downloader
      dockerfile: Dockerfile
    image: tik-downloader:latest
    container_name: tik-downloader
    restart: always
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - STORAGE_DIR=./storage
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      - SIGNED_URL_EXPIRATION_MIN=${SIGNED_URL_EXPIRATION_MIN:-30}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - DOWNLOAD_SUBDOMAIN=${DOWNLOAD_SUBDOMAIN}
      - PATH_PREFIX=/tik
      - TIK_EXTRACTOR_URL=http://tik-extractor:5555
      - HUB_TOKEN=${HUB_TOKEN}
      - CLEANUP_INTERVAL=*/5 * * * *
      - MAX_JOB_AGE_MIN=15
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB}
      - WARP_USER=${WARP_USER}
      - WARP_PASS=${WARP_PASS}
    volumes:
      - tik_storage:/app/storage
    depends_on:
      tik-extractor:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # Instagram Extractor service
  insta-extractor:
    build:
      context: ./insta-extractor
      dockerfile: Dockerfile
    image: insta-extractor:latest
    container_name: insta-extractor
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # Instagram Downloader service
  insta-downloader:
    platform: linux/amd64
    build:
      context: ./insta-downloader
      dockerfile: Dockerfile
    image: insta-downloader:latest
    container_name: insta-downloader
    restart: always
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - STORAGE_DIR=./storage
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      - SIGNED_URL_EXPIRATION_MIN=${SIGNED_URL_EXPIRATION_MIN:-30}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - DOWNLOAD_SUBDOMAIN=${DOWNLOAD_SUBDOMAIN}
      - PATH_PREFIX=/insta
      - INSTA_EXTRACTOR_URL=http://insta-extractor:8000
      - INSTA_DEFAULT_COOKIE=68945585894%3ARnKPEeskSje0XH%3A29%3AAYj7AoF4XI5DFWfo9j7nMzCSVmaF1pTGKbMudRqh2w
      - HUB_TOKEN=${HUB_TOKEN}
      - CLEANUP_INTERVAL=*/5 * * * *
      - MAX_JOB_AGE_MIN=15
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=cookie
      - WARP_USER=${WARP_USER}
      - WARP_PASS=${WARP_PASS}
    volumes:
      - insta_storage:/app/storage
    depends_on:
      insta-extractor:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # Facebook Extractor service
  fb-extractor:
    build:
      context: ./fb-extractor
      dockerfile: Dockerfile
    image: fb-extractor:latest
    container_name: fb-extractor
    restart: always
    ports:
      - "8002:8002"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
