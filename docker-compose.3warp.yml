  # Universal Extractor service (fallback for all other sites)
  uni-extractor:
    build:
      context: ./uni-extractor
      dockerfile: Dockerfile
    image: uni-extractor:latest
    container_name: uni-extractor
    restart: always
    ports:
      - "8004:8004"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')" ]
