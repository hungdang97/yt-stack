services:
  # Cloudflare WARP - SOCKS5 proxy on port 40000
  warp:
    image: caomingjun/warp:latest
    container_name: warp
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    # logging:
    #   driver: "none"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend

  # Gost - HTTP proxy with authentication
  gost:
    image: ginuerzh/gost:latest
    container_name: gost
    restart: always
    depends_on:
      warp:
        condition: service_healthy
    ports:
      - "1111:1111" # WARP proxy (public)
      - "2222:2222" # Direct proxy (public)
    environment:
      - WARP_USER=${WARP_USER}
      - WARP_PASS=${WARP_PASS}
      - DIRECT_USER=${DIRECT_USER}
      - DIRECT_PASS=${DIRECT_PASS}
    # logging:
    #   driver: "none"
    command: >
      -L=http://${WARP_USER}:${WARP_PASS}@:1111?probeResist=code:400 -F=socks5://warp:40000 -L=http://${DIRECT_USER}:${DIRECT_PASS}@:2222?probeResist=code:400
    networks:
      - backend

  # YouTube Downloader Go service
  yt-downloader:
    platform: linux/amd64
    build:
      context: ./yt-downloader
      dockerfile: Dockerfile
    image: yt-downloader:latest
    container_name: yt-downloader
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env # Load all ~30 config variables
    volumes:
      - yt_storage:/app/storage
    # logging:
    #   driver: "none"
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend

  # YouTube Extractor Python service (Fallback layer)
  yt-extractor:
    platform: linux/amd64
    build:
      context: ./yt-extractor
      dockerfile: Dockerfile
    image: yt-extractor:latest
    container_name: yt-extractor
    restart: always
    ports:
      - "8300:8300" # Expose for external access
    environment:
      - PYTHONUNBUFFERED=1
    # logging:
    #   driver: "none"
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8300/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend

  # YouTube Extractor Android (NewPipe-based) - Primary layer
  yt-extractor-android:
    platform: linux/amd64
    build:
      context: ./yt-extractor-android
      dockerfile: Dockerfile
    image: yt-extractor-android:latest
    container_name: yt-extractor-android
    restart: always
    ports:
      - "8100:8100" # Expose for external access
    environment:
      - SERVER_PORT=8100
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    # logging:
    #   driver: "none"
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/api/youtube/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend

  # Nginx reverse proxy with SSL for yt-downloader domain
  nginx:
    platform: linux/amd64
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx-ssl:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOWNLOAD_DOMAIN=${DOWNLOAD_SUBDOMAIN}.${BASE_DOMAIN}
      - EMAIL=${EMAIL}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # logging:
    #   driver: "none"
    depends_on:
      yt-downloader:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  warp_data:
  yt_storage:
  letsencrypt:
  certbot_webroot:
