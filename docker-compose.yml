services:
  # ============================================================
  # WARP Pool - 5 instances with separate identities/IPs
  # Each has its own volume → unique Cloudflare registration
  # ============================================================
  warp-1:
    image: caomingjun/warp:latest
    container_name: warp-1
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_1:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  warp-2:
    image: caomingjun/warp:latest
    container_name: warp-2
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_2:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  warp-3:
    image: caomingjun/warp:latest
    container_name: warp-3
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_3:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  warp-4:
    image: caomingjun/warp:latest
    container_name: warp-4
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_4:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  warp-5:
    image: caomingjun/warp:latest
    container_name: warp-5
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data_5:/var/lib/cloudflare-warp
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L :40000
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "--socks5", "127.0.0.1:40000", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    networks:
      - backend

  # ============================================================
  # Gost - Load balanced HTTP proxy across WARP pool
  # strategy=round: round-robin across 5 WARPs
  # max_fails=3: mark node dead after 3 consecutive failures
  # fail_timeout=180s: retry dead node after 3 minutes
  # ============================================================
  gost:
    image: ginuerzh/gost:latest
    container_name: gost
    restart: always
    depends_on:
      warp-1:
        condition: service_healthy
      warp-2:
        condition: service_healthy
      warp-3:
        condition: service_healthy
      warp-4:
        condition: service_healthy
      warp-5:
        condition: service_healthy
    ports:
      - "1111:1111" # WARP proxy (public, load balanced)
      - "2222:2222" # Direct proxy (public)
    environment:
      - WARP_USER=${WARP_USER}
      - WARP_PASS=${WARP_PASS}
      - DIRECT_USER=${DIRECT_USER}
      - DIRECT_PASS=${DIRECT_PASS}
    command: >
      -L=http://${WARP_USER}:${WARP_PASS}@:1111?probeResist=code:400 -F=socks5://warp-1:40000?ip=warp-1:40000,warp-2:40000,warp-3:40000,warp-4:40000,warp-5:40000&strategy=round&max_fails=3&fail_timeout=180s -L=http://${DIRECT_USER}:${DIRECT_PASS}@:2222?probeResist=code:400
    networks:
      - backend

  # YouTube Downloader Go service
  yt-downloader:
    platform: linux/amd64
    build:
      context: ./yt-downloader
      dockerfile: Dockerfile
    image: yt-downloader:latest
    container_name: yt-downloader
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env # Load all ~30 config variables
    volumes:
      - yt_storage:/app/storage
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          # Limit to 3.6 CPU cores (90% of 4 cores)
          cpus: '3.6'
    networks:
      - backend

  # YouTube Extractor Python service (Fallback layer)
  yt-extractor:
    platform: linux/amd64
    build:
      context: ./yt-extractor
      dockerfile: Dockerfile
    image: yt-extractor:latest
    container_name: yt-extractor
    restart: always
    ports:
      - "8300:8300" # Expose for external access
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      gost:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8300/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend

  # TikTok Extractor service
  tik-extractor:
    build:
      context: ./tik-extractor
      dockerfile: Dockerfile.api
    container_name: tik-extractor
    restart: unless-stopped
    ports:
      - "5555:5555" # Expose TikTok API
    volumes:
      - tik_volume:/app/Volume
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # TikTok Downloader service
  tik-downloader:
    platform: linux/amd64
    build:
      context: ./tik-downloader
      dockerfile: Dockerfile
    image: tik-downloader:latest
    container_name: tik-downloader
    restart: always
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - STORAGE_DIR=./storage
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      - SIGNED_URL_EXPIRATION_MIN=${SIGNED_URL_EXPIRATION_MIN:-30}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - DOWNLOAD_SUBDOMAIN=${DOWNLOAD_SUBDOMAIN}
      - PATH_PREFIX=/tik
      - TIK_EXTRACTOR_URL=http://tik-extractor:5555
      - HUB_TOKEN=${HUB_TOKEN}
      - CLEANUP_INTERVAL=*/5 * * * *
      - MAX_JOB_AGE_MIN=15
      - MONGO_URI=${MONGO_URI:-mongodb://cookie:cookie123456789@85.10.196.119:27017/cookie}
      - MONGO_DB=${MONGO_DB:-cookie}
      - WARP_USER=${WARP_USER}
      - WARP_PASS=${WARP_PASS}
    volumes:
      - tik_storage:/app/storage
    depends_on:
      tik-extractor:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # Nginx reverse proxy with SSL
  nginx:
    platform: linux/amd64
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx-ssl:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOWNLOAD_DOMAIN=${DOWNLOAD_SUBDOMAIN}.${BASE_DOMAIN}
      - EMAIL=${EMAIL}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      yt-downloader:
        condition: service_healthy
      tik-downloader:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  warp_data_1:
  warp_data_2:
  warp_data_3:
  warp_data_4:
  warp_data_5:
  yt_storage:
  tik_volume:
  tik_storage:
  letsencrypt:
  certbot_webroot:
