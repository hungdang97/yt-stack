events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging disabled for production performance
    access_log off;
    error_log /var/log/nginx/error.log crit;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_status 429;

    # Upstream backend services
    upstream yt_downloader {
        server yt-downloader:5001;
    }

    upstream tik_downloader {
        server tik-downloader:5002;
    }

    upstream insta_downloader {
        server insta-downloader:5003;
    }

    # HTTP to HTTPS redirect for main domain
    server {
        listen 80;
        server_name ${DOWNLOAD_DOMAIN};

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server for main domain (yt-downloader)
    server {
        listen 443 ssl http2;
        server_name ${DOWNLOAD_DOMAIN};

        # SSL certificates (managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/${DOWNLOAD_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOWNLOAD_DOMAIN}/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/${DOWNLOAD_DOMAIN}/chain.pem;

        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Proxy to yt-downloader (YouTube - default)
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://yt_downloader;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # Proxy to tik-downloader (TikTok)
        # Trailing slash strips /tik prefix: /tik/api/download → /api/download
        location /tik/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://tik_downloader/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # Proxy to insta-downloader (Instagram)
        location /insta/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://insta_downloader/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://yt_downloader/health;
            access_log off;
        }
    }
}

