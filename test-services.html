<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Health Test</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 24px;
    }

    .config-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      background: #1e293b;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .config-bar label {
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: nowrap;
    }

    .config-bar input {
      flex: 1;
      padding: 8px 10px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .config-bar input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #2563eb;
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #475569;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #b91c1c;
    }

    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-card {
      flex: 1;
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      border: 1px solid #334155;
    }

    .summary-card .num {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .summary-card .label {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .num.green {
      color: #22c55e;
    }

    .num.red {
      color: #ef4444;
    }

    .num.yellow {
      color: #eab308;
    }

    .num.blue {
      color: #3b82f6;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 10px;
      margin-top: 28px;
    }

    .test-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .test-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e293b;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      transition: border-color 0.2s;
    }

    .test-row.pass {
      border-color: #166534;
    }

    .test-row.fail {
      border-color: #991b1b;
    }

    .test-row.running {
      border-color: #1d4ed8;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }

    .status-dot.pass {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
    }

    .status-dot.fail {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
    }

    .status-dot.running {
      background: #3b82f6;
      animation: pulse 1s infinite;
    }

    .status-dot.skip {
      background: #eab308;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .test-name {
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 150px;
    }

    .test-detail {
      flex: 1;
      font-size: 0.8rem;
      color: #94a3b8;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
    }

    .test-time {
      font-size: 0.8rem;
      color: #64748b;
      font-family: 'SF Mono', monospace;
      white-space: nowrap;
    }

    .test-status {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .test-status.pass {
      background: #14532d;
      color: #4ade80;
    }

    .test-status.fail {
      background: #450a0a;
      color: #fca5a5;
    }

    .test-status.running {
      background: #1e3a5f;
      color: #93c5fd;
    }

    .test-status.skip {
      background: #422006;
      color: #fde047;
    }

    .test-status.idle {
      background: #1e293b;
      color: #64748b;
    }

    .test-btn {
      padding: 4px 10px;
      font-size: 0.75rem;
      background: #334155;
      color: #e2e8f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .test-btn:hover {
      background: #475569;
    }

    .log-section {
      margin-top: 28px;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }

    .log-header span {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
    }

    .log-body {
      padding: 12px 16px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
    }

    .log-line {
      color: #94a3b8;
    }

    .log-line.error {
      color: #fca5a5;
    }

    .log-line.success {
      color: #86efac;
    }

    .log-line.info {
      color: #93c5fd;
    }

    .log-line .ts {
      color: #475569;
    }
  </style>
</head>

<body>
  <h1>Service Health & Integration Test</h1>
  <p class="subtitle">Test all download services end-to-end with one click</p>

  <div class="config-bar">
    <label>API Base:</label>
    <input type="text" id="apiBase" value="https://vps-7a60dd29.example.com">
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnTestAll" onclick="runAllTests()">Test All Services</button>
    <button class="btn btn-secondary" id="btnHealthOnly" onclick="runHealthChecks()">Health Check Only</button>
    <button class="btn btn-danger" id="btnStop" onclick="stopAllTests()" disabled>Stop</button>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="num blue" id="totalCount">0</div>
      <div class="label">Total</div>
    </div>
    <div class="summary-card">
      <div class="num green" id="passCount">0</div>
      <div class="label">Passed</div>
    </div>
    <div class="summary-card">
      <div class="num red" id="failCount">0</div>
      <div class="label">Failed</div>
    </div>
    <div class="summary-card">
      <div class="num yellow" id="timeTotal">-</div>
      <div class="label">Total Time</div>
    </div>
  </div>

  <!-- Health Checks -->
  <div class="section-title">Health Checks</div>
  <div class="test-grid" id="healthTests"></div>

  <!-- Download Tests -->
  <div class="section-title">Download Integration Tests</div>
  <div class="test-grid" id="downloadTests"></div>

  <!-- Logs -->
  <div class="log-section">
    <div class="log-header">
      <span>Live Log</span>
      <button class="test-btn" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

  <script>
    const HUB_TOKEN = '1234567890987654321234567890987654321';
    let abortController = null;
    let totalStartTime = null;

    // ── Test Definitions ──

    const healthTests = [
      { id: 'health-yt-dl', name: 'yt-downloader', endpoint: '/health' },
      { id: 'health-yt-ex', name: 'yt-extractor', endpoint: '/health', note: 'via nginx' },
      { id: 'health-tik-dl', name: 'tik-downloader', endpoint: '/tik/health' },
      { id: 'health-tik-ex', name: 'tik-extractor', endpoint: '/tik/health', note: 'via nginx→tik' },
      { id: 'health-insta-dl', name: 'insta-downloader', endpoint: '/insta/health' },
      { id: 'health-insta-ex', name: 'insta-extractor', endpoint: '/insta/health', note: 'via nginx→insta' },
      { id: 'health-fb-dl', name: 'fb-downloader', endpoint: '/fb/health' },
      { id: 'health-fb-ex', name: 'fb-extractor', endpoint: '/fb/health', note: 'via nginx→fb' },
    ];

    const downloadTests = [
      {
        id: 'dl-yt-video',
        name: 'YouTube Video',
        endpoint: '/api/download',
        body: {
          url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ',
          os: 'windows',
          output: { type: 'video', format: 'mp4' },
          audio: { bitrate: '192k' },
          filenameStyle: 'basic'
        }
      },
      {
        id: 'dl-yt-audio',
        name: 'YouTube Audio',
        endpoint: '/api/download',
        body: {
          url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ',
          os: 'windows',
          output: { type: 'audio', format: 'mp3' },
          audio: { bitrate: '192k' },
          filenameStyle: 'basic'
        }
      },
      {
        id: 'dl-tik-video',
        name: 'TikTok Video',
        endpoint: '/tik/api/download',
        body: {
          url: 'https://www.tiktok.com/@acurrentaffair9/video/7615503320840506636?is_from_webapp=1&sender_device=pc',
          output: { type: 'video' }
        }
      },
      {
        id: 'dl-tik-audio',
        name: 'TikTok Audio',
        endpoint: '/tik/api/download',
        body: {
          url: 'https://www.tiktok.com/@acurrentaffair9/video/7615503320840506636?is_from_webapp=1&sender_device=pc',
          output: { type: 'audio' }
        }
      },
      {
        id: 'dl-insta-video',
        name: 'Instagram Video',
        endpoint: '/insta/api/download',
        body: {
          url: 'https://www.instagram.com/p/DVzP--KgJou/',
          os: 'windows',
          output: { type: 'video' }
        }
      },
      {
        id: 'dl-insta-audio',
        name: 'Instagram Audio',
        endpoint: '/insta/api/download',
        body: {
          url: 'https://www.instagram.com/p/DVzP--KgJou/',
          os: 'windows',
          output: { type: 'audio' }
        }
      },
      {
        id: 'dl-fb-video',
        name: 'Facebook Video',
        endpoint: '/fb/api/download',
        body: {
          url: 'https://www.facebook.com/share/v/1EAURLvgtg/',
          os: 'windows',
          output: { type: 'video' }
        }
      },
      {
        id: 'dl-fb-audio',
        name: 'Facebook Audio',
        endpoint: '/fb/api/download',
        body: {
          url: 'https://www.facebook.com/share/v/1EAURLvgtg/',
          os: 'windows',
          output: { type: 'audio' }
        }
      },
    ];

    // ── State ──

    const testResults = {};

    // ── Render ──

    function renderTests() {
      const healthGrid = document.getElementById('healthTests');
      const dlGrid = document.getElementById('downloadTests');

      healthGrid.innerHTML = healthTests.map(t => testRowHTML(t)).join('');
      dlGrid.innerHTML = downloadTests.map(t => testRowHTML(t)).join('');
    }

    function testRowHTML(t) {
      const r = testResults[t.id] || {};
      const state = r.state || 'idle';
      return `
        <div class="test-row ${state}" id="row-${t.id}">
          <div class="status-dot ${state}"></div>
          <div class="test-name">${t.name}</div>
          <div class="test-detail" id="detail-${t.id}">${r.detail || t.endpoint}</div>
          <div class="test-time" id="time-${t.id}">${r.time ? r.time + 'ms' : '-'}</div>
          <span class="test-status ${state}" id="status-${t.id}">${stateLabel(state)}</span>
          <button class="test-btn" onclick="runSingleTest('${t.id}')">Run</button>
        </div>`;
    }

    function stateLabel(s) {
      return { idle: 'IDLE', running: 'RUNNING', pass: 'PASS', fail: 'FAIL', skip: 'SKIP' }[s] || s.toUpperCase();
    }

    function updateRow(id, state, detail, time) {
      testResults[id] = { state, detail, time };
      const row = document.getElementById(`row-${id}`);
      const dot = row?.querySelector('.status-dot');
      const statusEl = document.getElementById(`status-${id}`);
      const detailEl = document.getElementById(`detail-${id}`);
      const timeEl = document.getElementById(`time-${id}`);

      if (row) {
        row.className = `test-row ${state}`;
      }
      if (dot) {
        dot.className = `status-dot ${state}`;
      }
      if (statusEl) {
        statusEl.className = `test-status ${state}`;
        statusEl.textContent = stateLabel(state);
      }
      if (detailEl && detail !== undefined) detailEl.textContent = detail;
      if (timeEl) timeEl.textContent = time ? time + 'ms' : '-';

      updateSummary();
    }

    function updateSummary() {
      const all = Object.values(testResults);
      const passed = all.filter(r => r.state === 'pass').length;
      const failed = all.filter(r => r.state === 'fail').length;

      document.getElementById('totalCount').textContent = all.length;
      document.getElementById('passCount').textContent = passed;
      document.getElementById('failCount').textContent = failed;

      if (totalStartTime) {
        const elapsed = ((Date.now() - totalStartTime) / 1000).toFixed(1);
        document.getElementById('timeTotal').textContent = elapsed + 's';
      }
    }

    // ── Logging ──

    function log(msg, type = '') {
      const logBody = document.getElementById('logBody');
      const ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      line.innerHTML = `<span class="ts">[${ts}]</span> ${escapeHtml(msg)}`;
      logBody.appendChild(line);
      logBody.scrollTop = logBody.scrollHeight;
    }

    function clearLog() {
      document.getElementById('logBody').innerHTML = '';
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── API helpers ──

    function getBase() {
      return document.getElementById('apiBase').value.replace(/\/+$/, '');
    }

    async function fetchWithTimeout(url, opts = {}, timeoutMs = 15000) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      if (abortController) {
        abortController.signal.addEventListener('abort', () => ctrl.abort());
      }
      try {
        const res = await fetch(url, { ...opts, signal: ctrl.signal });
        clearTimeout(timer);
        return res;
      } catch (e) {
        clearTimeout(timer);
        throw e;
      }
    }

    // ── Health Check ──

    async function testHealth(t) {
      const url = getBase() + t.endpoint;
      updateRow(t.id, 'running', url);
      log(`[Health] Testing ${t.name} → ${url}`, 'info');

      const start = Date.now();
      try {
        const res = await fetchWithTimeout(url, {}, 10000);
        const ms = Date.now() - start;
        const data = await res.json().catch(() => null);

        if (res.ok) {
          const version = data?.version || '';
          const detail = `${res.status} OK` + (version ? ` (v${version})` : '');
          updateRow(t.id, 'pass', detail, ms);
          log(`[Health] ${t.name}: ${detail} [${ms}ms]`, 'success');
        } else {
          const detail = `${res.status} ${res.statusText}`;
          updateRow(t.id, 'fail', detail, ms);
          log(`[Health] ${t.name}: ${detail} [${ms}ms]`, 'error');
        }
      } catch (e) {
        const ms = Date.now() - start;
        const detail = e.name === 'AbortError' ? 'Timeout / Aborted' : e.message;
        updateRow(t.id, 'fail', detail, ms);
        log(`[Health] ${t.name}: ${detail} [${ms}ms]`, 'error');
      }
    }

    // ── Download Test ──

    async function testDownload(t) {
      const url = getBase() + t.endpoint;
      updateRow(t.id, 'running', `POST ${t.endpoint}`);
      log(`[Download] Testing ${t.name} → POST ${url}`, 'info');

      const start = Date.now();
      try {
        // Step 1: Submit download request
        const res = await fetchWithTimeout(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Hub-Token': HUB_TOKEN
          },
          body: JSON.stringify(t.body)
        }, 30000);

        const data = await res.json().catch(() => null);

        if (!res.ok) {
          const ms = Date.now() - start;
          const errMsg = data?.error?.message || data?.error || `HTTP ${res.status}`;
          updateRow(t.id, 'fail', `Submit failed: ${errMsg}`, ms);
          log(`[Download] ${t.name}: Submit failed → ${errMsg} [${ms}ms]`, 'error');
          return;
        }

        const statusUrl = data?.statusUrl;
        const title = data?.title || '';
        log(`[Download] ${t.name}: Job created → "${title}"`, 'info');

        if (!statusUrl) {
          const ms = Date.now() - start;
          updateRow(t.id, 'fail', 'No statusUrl in response', ms);
          log(`[Download] ${t.name}: No statusUrl returned`, 'error');
          return;
        }

        // Step 2: Poll status until completed/error (max 120s)
        updateRow(t.id, 'running', `Polling: ${title || statusUrl}`);
        const maxPoll = 120000;
        const pollStart = Date.now();

        while (Date.now() - pollStart < maxPoll) {
          if (abortController?.signal.aborted) {
            const ms = Date.now() - start;
            updateRow(t.id, 'skip', 'Aborted by user', ms);
            log(`[Download] ${t.name}: Aborted`, 'error');
            return;
          }

          await sleep(2000);

          try {
            const sRes = await fetchWithTimeout(statusUrl, {}, 10000);
            const sData = await sRes.json().catch(() => null);

            if (!sRes.ok) {
              const ms = Date.now() - start;
              updateRow(t.id, 'fail', `Status poll error: HTTP ${sRes.status}`, ms);
              log(`[Download] ${t.name}: Status poll HTTP ${sRes.status}`, 'error');
              return;
            }

            const status = sData?.status;
            const progress = sData?.progress || 0;

            updateRow(t.id, 'running', `${status} ${progress}%`);

            if (status === 'completed') {
              const ms = Date.now() - start;
              const dlUrl = sData?.downloadUrl || '';
              const filename = dlUrl.split('/').pop()?.split('?')[0] || '';
              updateRow(t.id, 'pass', `${filename || 'Done'}`, ms);
              log(`[Download] ${t.name}: Completed → ${filename} [${ms}ms]`, 'success');
              return;
            }

            if (status === 'error') {
              const ms = Date.now() - start;
              const errMsg = sData?.error || sData?.jobError || 'Unknown error';
              updateRow(t.id, 'fail', errMsg, ms);
              log(`[Download] ${t.name}: Error → ${errMsg} [${ms}ms]`, 'error');
              return;
            }
          } catch (pollErr) {
            // Ignore transient poll errors, keep retrying
          }
        }

        // Timeout
        const ms = Date.now() - start;
        updateRow(t.id, 'fail', 'Timeout (120s)', ms);
        log(`[Download] ${t.name}: Timed out after 120s`, 'error');

      } catch (e) {
        const ms = Date.now() - start;
        const detail = e.name === 'AbortError' ? 'Aborted' : e.message;
        updateRow(t.id, 'fail', detail, ms);
        log(`[Download] ${t.name}: ${detail} [${ms}ms]`, 'error');
      }
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // ── Run Tests ──

    async function runHealthChecks() {
      setRunning(true);
      log('─── Health Check Started ───', 'info');
      totalStartTime = Date.now();

      // Run all health checks in parallel
      await Promise.all(healthTests.map(t => testHealth(t)));

      updateSummary();
      log('─── Health Check Done ───', 'info');
      setRunning(false);
    }

    async function runAllTests() {
      setRunning(true);
      totalStartTime = Date.now();
      log('═══ Full Test Suite Started ═══', 'info');

      // 1. Health checks first (parallel)
      log('─── Phase 1: Health Checks ───', 'info');
      await Promise.all(healthTests.map(t => testHealth(t)));

      if (abortController?.signal.aborted) {
        setRunning(false);
        return;
      }

      // 2. Download tests (sequential to avoid overloading server)
      log('─── Phase 2: Download Tests ───', 'info');
      for (const t of downloadTests) {
        if (abortController?.signal.aborted) break;
        await testDownload(t);
      }

      updateSummary();
      log('═══ Full Test Suite Done ═══', 'info');
      setRunning(false);
    }

    async function runSingleTest(id) {
      const ht = healthTests.find(t => t.id === id);
      if (ht) {
        totalStartTime = totalStartTime || Date.now();
        await testHealth(ht);
        return;
      }
      const dt = downloadTests.find(t => t.id === id);
      if (dt) {
        totalStartTime = totalStartTime || Date.now();
        abortController = new AbortController();
        document.getElementById('btnStop').disabled = false;
        await testDownload(dt);
        document.getElementById('btnStop').disabled = true;
        abortController = null;
      }
    }

    function stopAllTests() {
      if (abortController) {
        abortController.abort();
        log('Tests aborted by user', 'error');
      }
    }

    function setRunning(running) {
      document.getElementById('btnTestAll').disabled = running;
      document.getElementById('btnHealthOnly').disabled = running;
      document.getElementById('btnStop').disabled = !running;

      if (running) {
        abortController = new AbortController();
      } else {
        abortController = null;
      }
    }

    // ── Init ──
    renderTests();
  </script>
</body>

</html>
